name: Verify R6 module compiles

on:
  push:
    branches: [master]
    paths:
      - 'org.hl7.fhir.r6/**'
      - 'org.hl7.fhir.core.generator/**'
      - 'pom.xml'
      - '.github/workflows/verify-r6.yml'
  pull_request:
    branches: [master]
    paths:
      - 'org.hl7.fhir.r6/**'
      - 'org.hl7.fhir.core.generator/**'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  verify-r6:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install r6 module dependencies (utilities, r5, r4b, r4)
        run: |
          for m in org.hl7.fhir.utilities org.hl7.fhir.r4 org.hl7.fhir.r4b org.hl7.fhir.r5; do
            mvn install -pl "$m" -am -Dmaven.test.skip=true -Dmaven.javadoc.skip=true --no-transfer-progress
          done

      - name: Compile org.hl7.fhir.r6
        run: mvn compile -pl org.hl7.fhir.r6 --no-transfer-progress

      - name: Install org.hl7.fhir.r6 (skipping tests)
        run: mvn install -pl org.hl7.fhir.r6 -Dmaven.test.skip=true -Dmaven.javadoc.skip=true --no-transfer-progress
